<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Typing Workspace · MatrixHanzi</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f6f1; --text: #27231f; --muted: #9a9185; --faint: #c7beb2; --surface: #fffdfa; --line: rgba(80,70,58,.12);
      --accent: #8b5e3c; --accent-soft: rgba(139,94,60,.12); --wrong: #b45345; --correct: #70685f; --shadow: 0 22px 60px rgba(75,60,45,.12);
      --font-ui: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-hanzi: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    [data-theme="dark"] { color-scheme: dark; --bg:#181714; --text:#eee8dd; --muted:#8f877d; --faint:#554f48; --surface:#211f1b; --line:rgba(238,232,221,.1); --accent:#d4aa7d; --accent-soft:rgba(212,170,125,.13); --wrong:#e08776; --correct:#9c9389; --shadow:0 22px 70px rgba(0,0,0,.25); }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100dvh; overflow-x: hidden; background: var(--bg); color: var(--text); font-family: var(--font-ui); transition: background .25s ease, color .25s ease; }
    button { font: inherit; cursor: pointer; }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    .workspace { min-height: 100dvh; display: grid; grid-template-rows: auto 1fr; padding: 24px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .back, .theme-toggle, .result-actions button { border: 0; border-radius: 999px; padding: 10px 14px; background: transparent; color: var(--muted); transition: color .18s ease, background .18s ease, transform .18s ease; }
    .back:hover, .theme-toggle:hover, .result-actions button:hover { color: var(--text); background: var(--accent-soft); transform: translateY(-1px); }
    .timer { font-family: var(--font-mono); color: var(--muted); font-size: clamp(16px, 2vw, 20px); }
    .stage { position: relative; display: flex; justify-content: center; align-items: start; padding-top: clamp(72px, 18dvh, 170px); }
    .typing-area { position: relative; width: min(980px, 100%); outline: none; user-select: none; }
    .text-line { position: relative; font-family: var(--font-hanzi); font-size: clamp(34px, 6vw, 70px); line-height: 1.72; letter-spacing: .045em; color: var(--faint); overflow-wrap: anywhere; }
    .char { position: relative; display: inline-block; white-space: pre-wrap; transition: color .12s ease, opacity .12s ease, text-decoration-color .12s ease; }
    .char.pending { color: var(--faint); }
    .char.active { color: var(--text); }
    .char.correct { color: var(--correct); opacity: .48; }
    .char.incorrect { color: var(--wrong); text-decoration: underline; text-decoration-thickness: .08em; text-underline-offset: .18em; }
    .caret { position: absolute; width: 2px; height: 1.08em; border-radius: 999px; background: var(--accent); transform: translate3d(0,0,0); transition: left .08s ease, top .08s ease, height .08s ease; animation: blink 1s ease-in-out infinite; pointer-events: none; }
    @keyframes blink { 0%,45% { opacity: 1; } 55%,100% { opacity: .25; } }
    .hidden-input { position: absolute; left: 0; top: 0; width: 2px; height: 24px; opacity: .001; pointer-events: none; font-size: 16px; line-height: 24px; color: transparent; background: transparent; border: 0; outline: 0; caret-color: transparent; transform: translate3d(0,0,0); }
    .overlay { position: fixed; inset: 0; display: none; place-items: end center; padding: 24px; background: rgba(24,23,20,.18); backdrop-filter: blur(10px); z-index: 20; }
    .overlay.show { display: grid; animation: fade .22s ease both; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .result-card { width: min(560px,100%); background: var(--surface); color: var(--text); border-radius: 28px; padding: 28px; border: 1px solid var(--line); box-shadow: var(--shadow); animation: cardUp .36s ease both; }
    @keyframes cardUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .result-card h1 { margin: 0 0 6px; letter-spacing: -.04em; color: var(--text); }
    .result-card p { margin: 0 0 22px; color: var(--muted); }
    .result-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
    .metric { background: var(--accent-soft); border: 1px solid var(--line); border-radius: 20px; padding: 16px; }
    .metric span { display:block; color: var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
    .metric strong { font-family: var(--font-mono); font-size:34px; line-height:1.2; font-weight:700; letter-spacing:-.03em; color: var(--text); }
    .result-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; }
    .result-actions button.primary { background: var(--text); color: var(--bg); }
    @media (max-width: 680px) { .workspace { padding: 16px; } .stage { padding-top: 10dvh; } .text-line { line-height: 1.62; } .result-grid { grid-template-columns: 1fr; } }
    @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation: none !important; transition: none !important; } }
  </style>
</head>
<body data-page="workspace">
  <main class="workspace">
    <header class="topbar"><button class="back" id="backHome" type="button" aria-label="Back to home">← Home</button><div class="timer" id="timer">00:00</div><button class="theme-toggle" data-theme-toggle aria-label="Toggle light or dark mode">Theme</button></header>
    <section class="stage" id="workspaceStage"><div class="typing-area" id="typingArea" tabindex="0" aria-label="Typing area. Click or tap to focus."><div class="text-line" id="typingText"></div><div class="caret" id="caret" aria-hidden="true"></div></div><input class="hidden-input" id="hiddenInput" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" aria-hidden="true" /></section>
  </main>
  <div class="overlay" id="resultOverlay" aria-live="polite"><section class="result-card" id="resultCard" aria-label="Typing result card"><h1>Session complete</h1><p id="resultSubtitle">A quiet repetition, saved.</p><div class="result-grid"><div class="metric"><span>WPM</span><strong id="resultWpm">0</strong></div><div class="metric"><span>Accuracy</span><strong id="resultAccuracy">0%</strong></div><div class="metric"><span>Hanzi Errors</span><strong id="resultErrors">0</strong></div><div class="metric"><span>Correct Hanzi / Total</span><strong id="resultChars">0/0</strong></div></div><div class="result-actions"><button class="primary" id="retryBtn" type="button">Retry</button><button id="homeBtn" type="button">Go Home</button><button id="shareBtn" type="button">Share</button></div></section></div>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
